# Nginx Configuration for Tivi Shop (SPA with React Router / Hash Router Fallback & Cache Optimization)
# Copy this file to your VPS (/etc/nginx/sites-available/tivishop) or use it in your Docker container build.

server {
    listen 80;
    server_name localhost;

    # Root directory where the production build files are located (dist/ folder output from 'npm run build')
    root /usr/share/nginx/html;
    index index.html;

    # Enable Gzip compression to maximize page speed & Lighthouse performance scores
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Secure HTTP Headers (XSS protection, Clickjacking prevention)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 1. Main SPA Rewriting & Routing
    # Correctly routes deep links or refreshes to index.html instead of showing Nginx 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Static Assets Caching Optimization
    # Cache CSS, JS, images, and fonts for 1 year for lightning-fast subsequent loads
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 3. Prevent Caching of index.html
    # Ensures browser always requests the latest index.html on update
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires 0;
    }

    # 4. Optional API Proxy Forwarding (If running full-stack behind Nginx)
    # Forward '/api/*' requests to the Node Express service running on port 3000
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # Custom Error Pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
